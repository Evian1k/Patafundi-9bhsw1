# Render Blueprint — backend API + PostgreSQL
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: patafundi-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://patafundi.vercel.app
      - key: COOKIE_SECURE
        value: "true"
      - key: EMAIL_FROM
        value: onboarding@resend.dev
      - key: RESEND_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: patafundi-db
          property: connectionString
      # Cloudflare R2 — private bucket, signed URLs only
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: patafundi
      # M-Pesa Daraja — leave sync:false so secrets never land in the blueprint
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: MPESA_CALLBACK_SECRET
        sync: false
      # Render deploy metadata (auto-populated by Render)
      - key: RENDER_GIT_COMMIT
        value: ""

databases:
  - name: patafundi-db
    plan: free
    databaseName: patafundi
    user: patafundi
    ipAllowList: []  # allow only Render services
