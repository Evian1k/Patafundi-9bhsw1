# Render Blueprint — backend API + PostgreSQL
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: patafundi-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://patafundi.vercel.app
      - key: COOKIE_SECURE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: patafundi-db
          property: connectionString

databases:
  - name: patafundi-db
    plan: free
    databaseName: patafundi
    user: patafundi
