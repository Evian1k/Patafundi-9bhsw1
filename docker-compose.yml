services:
  postgres:
    image: postgres:16-alpine
    container_name: patafundi-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: patafundi
    volumes:
      - patafundi_pgdata:/var/lib/postgresql/data

volumes:
  patafundi_pgdata:
